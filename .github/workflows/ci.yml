name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements/*.txt
            requirements.txt
            pyproject.toml

      - name: Install app dependencies excluding Airflow
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt
          pip install --no-deps -e .

      - name: Run tests
        run: pytest -q

      - name: Build API image
        run: docker build -f Dockerfile.api -t bitcoin-mlops-api:ci .

      - name: Build monitoring image
        run: docker build -f Dockerfile.monitoring -t bitcoin-mlops-monitoring:ci .

      - name: Build MLflow image
        run: docker build -f Dockerfile.mlflow -t bitcoin-mlops-mlflow:ci .
